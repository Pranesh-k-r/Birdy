
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Gift ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0);
background-size:400% 400%;
animation:bg 10s ease infinite;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;

overflow-x:hidden;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* Floating Hearts */

.hearts{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;

}

.heart{

position:absolute;
color:white;
font-size:20px;
animation:float linear forwards;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Card */

.card{

width:900px;
max-width:100%;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:40px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.2);

}

h1{

font-family:'Great Vibes',cursive;
font-size:60px;
color:white;

}

p{

color:white;
margin-top:15px;
font-size:18px;

}

.gift{

font-size:130px;

cursor:pointer;

margin:30px 0;

transition:.4s;

}

.gift:hover{

transform:scale(1.1) rotate(-8deg);

}

button{

padding:15px 40px;

border:none;

border-radius:50px;

background:white;

color:#ff2f70;

font-size:18px;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

#surprise{

display:none;

margin-top:40px;

animation:fade 1s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

img{

width:320px;
max-width:100%;

border-radius:20px;

margin:20px 0;

box-shadow:0 10px 25px rgba(0,0,0,.3);

}

video{

width:700px;
max-width:100%;

border-radius:20px;

margin-top:25px;

}

.message{

margin-top:25px;
font-size:20px;
line-height:1.8;
color:white;

}

.next{

margin-top:30px;

}

.confetti{

position:fixed;

width:8px;
height:8px;

border-radius:50%;

pointer-events:none;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

img{
    max-width:100%;
    height:auto;
}

video{
    max-width:100%;
    height:auto;
}

.container,
.card{
    width:90%;
    max-width:900px;
    margin:auto;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

@media (max-width:768px){

    h1{
        font-size:35px;
    }

    h2{
        font-size:25px;
    }

    p{
        font-size:16px;
    }

    .buttons{
        display:flex;
        flex-direction:column;
        gap:15px;
        align-items:center;
    }

    button{
        width:100%;
        max-width:300px;
    }

    .gallery{
        grid-template-columns:1fr;
    }

}

</style>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="hearts"></div>

<div class="card">

<h1>🎁 A Gift For You ❤️</h1>

<p>

I have one last surprise...

Click the gift below.

</p>

<div class="gift">

🎁

</div>

<button onclick="openGift()">

Open Your Gift ❤️

</button>

<div id="surprise">

<img src="kothi_draw.jpeg">

<br>

<video controls>

<source src="kothi_vid.mp4" type="video/mp4">

</video>

<div class="message">

This gift is just a small way of saying...

Thank you for being such a wonderful friend.

I hope this brings a smile to your face.

Happy Birthday! ❤️

</div>

<div class="next">

<button onclick="location.href='end.html'">

Final Surprise ➜

</button>

</div>

</div>

</div>

<script>

/* Open Gift */

function openGift(){

document.getElementById("surprise").style.display="block";

confetti();

}

/* Hearts */

const hearts=document.querySelector(".hearts");

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*5)+"s";

hearts.appendChild(heart);

setTimeout(()=>{

heart.remove();

},10000);

},300);

/* Confetti */

function confetti(){

for(let i=0;i<180;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.top="-20px";

c.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(c);

let y=0;

let x=(Math.random()-0.5)*5;

let fall=setInterval(()=>{

y+=5;

c.style.top=y+"px";

c.style.left=(parseFloat(c.style.left)+x)+"px";

if(y>window.innerHeight){

clearInterval(fall);

c.remove();

}

},15);

}

}

</script>

</body>
</html>
