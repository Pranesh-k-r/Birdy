
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-box{
    width:380px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 30px rgba(0,0,0,.2);
}

h1{
    color:white;
    margin-bottom:10px;
}

p{
    color:white;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff2f70;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffe6ef;
}

#error{
    margin-top:15px;
    color:yellow;
    font-weight:bold;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

img{
    max-width:100%;
    height:auto;
}

video{
    max-width:100%;
    height:auto;
}

.container,
.card{
    width:90%;
    max-width:900px;
    margin:auto;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

@media (max-width:768px){

    h1{
        font-size:35px;
    }

    h2{
        font-size:25px;
    }

    p{
        font-size:16px;
    }

    .buttons{
        display:flex;
        flex-direction:column;
        gap:15px;
        align-items:center;
    }

    button{
        width:100%;
        max-width:300px;
    }

    .gallery{
        grid-template-columns:1fr;
    }

}

</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<div class="login-box">

<h1>Kothi first Login madu</h1>


<input type="text" id="name" placeholder="Enter Your Name">

<select id="gender">
    <option value="">Select Gender</option>
    <option>Female</option>
    <option>Male</option>
    <option>Other</option>
</select>

<p>Enter Your Date of Birth</p>

<input type="date" id="dob">

<button onclick="checkDOB()">Open Surprise 🎁</button>

<p id="error"></p>

</div>

<script>

function checkDOB(){

    const dob = document.getElementById("dob").value;

    if(dob === "2005-06-27"){
        window.location.href="index.html";
    }
    else{
        document.getElementById("error").innerHTML="❌ Enter a valid Date of Birth!";
    }

}

</script>

</body>
</html>
